<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rollorian Book Archive</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-block">
          <a class="brand-link" href="#/">
            <span class="brand-mark">R</span>
            <span>
              <span class="eyebrow">Rollorian Archive</span>
              <strong>Book Archive</strong>
            </span>
          </a>
          <p class="brand-copy">A local-first reading archive with clean routes, real views, and zero frontend framework drama.</p>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <a href="#/" data-nav-link="/">Home</a>
          <a href="#/search" data-nav-link="/search">Search</a>
          <a href="#/library" data-nav-link="/library">Library</a>
        </nav>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>
    </div>

    <noscript>
      <div class="noscript-banner">This app needs JavaScript enabled to manage your archive.</div>
    </noscript>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
